<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shader Gallery</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #777;
      --accent: #818cf8;
      --accent-hover: #a5b4fc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    main {
      padding-top: 1.5rem;
    }

    /* --- filters --- */

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-bottom: 1.5rem;
    }

    .tag-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.375rem 0.875rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .tag-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .tag-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* --- grid --- */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      padding-bottom: 4rem;
    }

    /* --- card --- */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .card-thumb {
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: linear-gradient(135deg, #1e1b4b 0%, #1e3a5f 100%);
      flex-shrink: 0;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
    }

    .tag {
      font-size: 0.68rem;
      padding: 0.2rem 0.5rem;
      background: rgba(129, 140, 248, 0.12);
      color: var(--accent);
      border-radius: 0.25rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding-top: 0.25rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      color: var(--text);
    }

    /* --- states --- */

    .message {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 4rem 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>Shader Gallery</h1>
  </div>
</header>

<main class="container">
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</main>

<script>
  const filtersEl = document.getElementById('filters');
  const gridEl = document.getElementById('grid');
  const activeTags = new Set();
  let entries = [];

  async function init() {
    try {
      const res = await fetch('./gallery.json');
      if (!res.ok) throw new Error(res.statusText);
      entries = await res.json();
    } catch (e) {
      gridEl.innerHTML = '<p class="message">Failed to load gallery.json</p>';
      return;
    }

    const allTags = [...new Set(entries.flatMap(e => e.tags ?? []))].sort();
    renderFilters(allTags);
    renderCards(entries);
  }

  function renderFilters(tags) {
    const allBtn = makeTagBtn('All', true);
    allBtn.dataset.tag = '';
    filtersEl.appendChild(allBtn);

    tags.forEach(tag => {
      const btn = makeTagBtn(tag, false);
      btn.dataset.tag = tag;
      filtersEl.appendChild(btn);
    });

    filtersEl.addEventListener('click', e => {
      const btn = e.target.closest('.tag-btn');
      if (!btn) return;

      const tag = btn.dataset.tag;

      if (tag === '') {
        activeTags.clear();
        syncButtons();
      } else {
        activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
        syncButtons();
      }

      filterCards();
    });
  }

  function makeTagBtn(label, active) {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (active ? ' active' : '');
    btn.textContent = label;
    return btn;
  }

  function syncButtons() {
    filtersEl.querySelectorAll('.tag-btn').forEach(btn => {
      const tag = btn.dataset.tag;
      if (tag === '') {
        btn.classList.toggle('active', activeTags.size === 0);
      } else {
        btn.classList.toggle('active', activeTags.has(tag));
      }
    });
  }

  function filterCards() {
    gridEl.querySelectorAll('.card').forEach(card => {
      if (activeTags.size === 0) {
        card.style.display = '';
        return;
      }
      const cardTags = card.dataset.tags.split(',').filter(Boolean);
      card.style.display = cardTags.some(t => activeTags.has(t)) ? '' : 'none';
    });

    const anyVisible = [...gridEl.querySelectorAll('.card')].some(c => c.style.display !== 'none');
    let empty = gridEl.querySelector('.message');
    if (!anyVisible) {
      if (!empty) {
        empty = document.createElement('p');
        empty.className = 'message';
        empty.textContent = 'No entries match the selected tags.';
        gridEl.appendChild(empty);
      }
    } else {
      empty?.remove();
    }
  }

  function renderCards(entries) {
    if (!entries.length) {
      gridEl.innerHTML = '<p class="message">No entries in gallery.json yet.</p>';
      return;
    }

    entries.forEach(entry => {
      gridEl.appendChild(createCard(entry));
    });
  }

  function createCard(entry) {
    const tags = entry.tags ?? [];

    const card = document.createElement('article');
    card.className = 'card';
    card.dataset.tags = tags.join(',');

    const thumb = document.createElement('div');
    thumb.className = 'card-thumb';
    if (entry.thumbnail) {
      const img = document.createElement('img');
      img.src = entry.thumbnail;
      img.alt = entry.name;
      img.onerror = () => img.remove();
      thumb.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'card-body';

    if (tags.length) {
      const tagsRow = document.createElement('div');
      tagsRow.className = 'card-tags';
      tags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        tagsRow.appendChild(span);
      });
      body.appendChild(tagsRow);
    }

    const title = document.createElement('h2');
    title.className = 'card-title';
    title.textContent = entry.name;
    body.appendChild(title);

    const desc = document.createElement('p');
    desc.className = 'card-desc';
    desc.textContent = entry.description ?? '';
    body.appendChild(desc);

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    if (entry.animationUrl) {
      const view = document.createElement('a');
      view.className = 'btn-primary';
      view.href = entry.animationUrl;
      view.textContent = 'View Animation';
      actions.appendChild(view);
    }

    if (entry.originalUrl) {
      const orig = document.createElement('a');
      orig.className = 'btn-secondary';
      orig.href = entry.originalUrl;
      orig.textContent = 'Original';
      orig.target = '_blank';
      orig.rel = 'noopener noreferrer';
      actions.appendChild(orig);
    }

    body.appendChild(actions);
    card.appendChild(thumb);
    card.appendChild(body);
    return card;
  }

  init();
</script>

</body>
</html>
